version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "bot"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "build(deps):"
      include: "scope"
    allow:
      - dependency-type: "production"
      - dependency-type: "indirect"

  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "bot"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "build(deps):"
      include: "scope"
    allow:
      - dependency-type: "production"
      - dependency-type: "indirect"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps):"
      include: "scope"
