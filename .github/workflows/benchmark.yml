name: Scheduled Benchmark

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  daily-benchmark:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run benchmark
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        cd backend
        python -c "
        import sys
        sys.path.insert(0, '..')
        from eval.benchmark import run_benchmark
        from providers.groq_provider import GroqProvider
        from providers.github_provider import GithubModelsProvider
        
        candidates = [
            ('llama-3.1-70b-versatile', GroqProvider()),
            ('gpt-4o-mini', GithubModelsProvider()),
        ]
        
        results = run_benchmark('../data/dataset.jsonl', candidates)
        print(f'Benchmark completed with {len(results)} results')
        "

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: data/results/
        retention-days: 30
      continue-on-error: true

    - name: Create GitHub Release with results
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: benchmark-${{ github.run_number }}
        release_name: Benchmark Run ${{ github.run_number }}
        body: Daily benchmark results
        draft: false
        prerelease: true
      continue-on-error: true

    - name: Comment on latest issue
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: 1,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: 'Daily benchmark completed - Run #${{ github.run_number }}'
          })
      continue-on-error: true
