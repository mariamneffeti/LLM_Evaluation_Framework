name: Release & Documentation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/llm-eval:latest
          ${{ secrets.DOCKER_USERNAME }}/llm-eval:${{ github.event.release.tag_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true

  publish-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build documentation
      run: |
        mkdir -p public
        # Copy markdown files
        cp README.md public/index.md
        cp QUICKSTART.md public/quickstart.md
        cp TESTING.md public/testing.md

    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: public/

  deploy-pages:
    runs-on: ubuntu-latest
    needs: publish-docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  github-release-notes:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create release notes
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const changelog = `
          # Release ${{ github.event.release.tag_name }}
          
          ## Changes
          ${{ github.event.release.body }}
          
          ## Docker Image
          \`\`\`bash
          docker pull ${{ secrets.DOCKER_USERNAME }}/llm-eval:${{ github.event.release.tag_name }}
          \`\`\`
          
          ## Installation
          See [QUICKSTART.md](QUICKSTART.md) for installation instructions.
          `;
          
          if (fs.existsSync('CHANGELOG.md')) {
            fs.appendFileSync('CHANGELOG.md', '\n' + changelog);
          } else {
            fs.writeFileSync('CHANGELOG.md', changelog);
          }

    - name: Commit changelog
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add CHANGELOG.md
        git commit -m "Update changelog for ${{ github.event.release.tag_name }}" || true
        git push
      continue-on-error: true

  enable-github-pages:
    runs-on: ubuntu-latest
    needs: publish-docs

    steps:
    - name: Enable GitHub Pages
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.repos.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            has_pages: true
          })
      continue-on-error: true
