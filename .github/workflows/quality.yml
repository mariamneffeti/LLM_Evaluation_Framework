name: Code Quality & Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  python-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install pylint flake8 black isort mypy

    - name: Black formatting check
      run: |
        black --check backend/ providers/ eval/ || true

    - name: isort import sort check
      run: |
        isort --check-only backend/ providers/ eval/ || true

    - name: Flake8 linting
      run: |
        flake8 backend/ providers/ eval/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Pylint analysis
      run: |
        pylint backend/ providers/ eval/ --exit-zero || true

    - name: Type checking with mypy
      run: |
        mypy backend/ --ignore-missing-imports || true

  javascript-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm ci --prefix frontend

    - name: ESLint
      run: npm run lint --prefix frontend || true

    - name: Prettier formatting check
      run: npx --prefix frontend prettier --check src/ || true

  code-scanning:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'javascript, python'

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  dependency-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install safety
      run: |
        pip install safety

    - name: Check Python dependencies
      run: |
        safety check --file backend/requirements.txt || true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Check Node dependencies
      run: |
        cd frontend
        npm audit || true
