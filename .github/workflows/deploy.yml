name: Deploy to Cloud
# This workflow builds the backend Docker image and deploys it to AWS EC2 and Google Cloud Run.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set lower case IMAGE_NAME
      run: |
        echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha

    - name: Build and push backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        labels: ${{ steps.meta.outputs.labels }}

  deploy-aws-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Set lower case IMAGE_NAME
      run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Deploy to AWS EC2 via SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.AWS_SSH_KEY }}
        HOST: ${{ secrets.AWS_EC2_HOST }}
        USER: ${{ secrets.AWS_EC2_USER }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
        
        ssh $USER@$HOST << 'EOF'
          cd /app
          git pull origin main
          # Ensure your docker-compose.yml also uses the lowercase name!
          docker-compose down
          docker-compose pull
          docker-compose up -d
          docker-compose exec -T backend alembic upgrade head || true
        EOF
      continue-on-error: true

  deploy-gcp-cloudrun:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Set lower case IMAGE_NAME
      run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Set up Cloud SDK
      uses: google-cloud-github-actions/setup-gcloud@v1
      with:
        service_account_json: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        export_default_credentials: true

    - name: Configure Docker for GCR
      run: gcloud auth configure-docker

    - name: Deploy to Google Cloud Run
      run: |
        gcloud run deploy llm-eval-backend \
          --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --set-env-vars GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }},GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
      continue-on-error: true

  notify-slack:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "LLM Evaluation Framework - Build ${{ job.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*LLM Evaluation Framework*\nBuild: *${{ job.status }}*\nRef: `${{ github.ref }}`"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      continue-on-error: true